version: "3.9"

name: coopwise

services:
  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:16-alpine
    container_name: coopwise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coopwise
      POSTGRES_PASSWORD: coopwise
      POSTGRES_DB: coopwise_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7-alpine
    container_name: coopwise_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # =========================
  # FastAPI Backend
  # =========================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: coopwise_backend
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
      "
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://coopwise:coopwise@postgres:5432/coopwise_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =========================
  # Celery Worker - Default
  # =========================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coopwise_celery_worker
    restart: unless-stopped
    command: >
      celery
      -A app.core.celery_app worker
      --loglevel=info
      -Q default
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://coopwise:coopwise@postgres:5432/coopwise_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/backend:/app
    depends_on:
      - backend

  # =========================
  # Notification Worker
  # =========================
  notification_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coopwise_notification_worker
    restart: unless-stopped
    command: >
      celery
      -A app.core.celery_app worker
      --loglevel=info
      -Q notifications
      --concurrency=10
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://coopwise:coopwise@postgres:5432/coopwise_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/backend:/app
    depends_on:
      - backend

  # =========================
  # Blockchain Worker
  # =========================
  blockchain_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coopwise_blockchain_worker
    restart: unless-stopped
    command: >
      celery
      -A app.core.celery_app worker
      --loglevel=info
      -Q blockchain
      --concurrency=5
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://coopwise:coopwise@postgres:5432/coopwise_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/backend:/app
    depends_on:
      - backend

  # =========================
  # Celery Beat Scheduler
  # =========================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coopwise_celery_beat
    restart: unless-stopped
    command: >
      celery
      -A app.core.celery_app beat
      --loglevel=info
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://coopwise:coopwise@postgres:5432/coopwise_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./apps/backend:/app
    depends_on:
      - backend

  # =========================
  # Flower Dashboard
  # =========================
  flower:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: coopwise_flower
    restart: unless-stopped
    command: >
      celery
      -A app.core.celery_app flower
      --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis

  # =========================
  # Next.js Frontend
  # =========================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: coopwise_frontend
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: