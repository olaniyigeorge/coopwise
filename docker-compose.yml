name: coopwise

services:
  postgres:
    image: postgres:16-alpine
    container_name: coopwise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coopwise
      POSTGRES_PASSWORD: coopwise
      POSTGRES_DB: coopwise_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopwise -d coopwise_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coopwise_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
